# Cloudflare Workers — API del catálogo con KV
# Docs: https://developers.cloudflare.com/kv/

name = "mascotas-catalogo-api"
main = "worker/src/index.js"
compatibility_date = "2024-11-01"

# 1) Creá un namespace en el dashboard:
#    Workers & Pages → KV → Create namespace (ej. "mascotas-catalogo")
# 2) Pegá el ID acá:
[[kv_namespaces]]
binding = "KV_BINDING"
id = "4efc2fb7852b4d23a0f8b1751cd8bcdb"

# Token para PUT /api/catalog y panel /admin (subir PDF, editar catálogo)
# wrangler secret put ADMIN_TOKEN

# Secreto HMAC compartido con Vercel (mismo valor en ambos lados)
# wrangler secret put CATALOG_HMAC_SECRET
